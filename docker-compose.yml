# docker-compose.yml for mcp-matrix
# Generated by DockerCompose skill — reviewed by Engineer + RedTeam
# Deploy: Portainer -> Stacks -> Add from Repository -> GitOps polling
# CI/CD: GitHub Actions builds image on push, updates this tag automatically
#
# SECURITY: This file was generated following PAI hardened container policy.
# Do NOT add: docker.sock mounts, privileged mode, host network/PID,
# extra capabilities, or secrets in environment variables.

services:
  mcp-matrix:
    image: ghcr.io/nsoult-agentic/mcp-matrix:sha-e8a1ab0
    container_name: mcp-matrix
    restart: unless-stopped

    # -- Network --
    ports:
      - "127.0.0.1:8903:8903"  # Loopback ONLY — no external access
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Access Synapse on host

    # -- Security Hardening --
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # -- Resource Limits --
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

    # -- Filesystem --
    volumes:
      # Secrets — root-owned on host, read-only in container
      - /srv/mcp-matrix/secrets:/secrets:ro
    tmpfs:
      - /tmp:size=64m,noexec,nosuid

    # -- Health Check --
    # Startup does login -> logout/all -> re-login -> sync, so allow 30s start
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8903/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    # -- Environment --
    environment:
      - NODE_ENV=production
      - SECRETS_DIR=/secrets
      - PORT=8903
      # NEVER put credentials here — read from /secrets/config.json
